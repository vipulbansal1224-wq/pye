backend:
  name: git-gateway
  branch: main # Branch to update on edits

# Location to store uploaded brand assets
media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "products"
    label: "Hand Tools (Products)"
    label_singular: "Product"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    editor:
      preview: false
    fields:
      - { label: "Unique ID", name: "id", widget: "string", default: "unique_id_here" }
      - { label: "Product Title", name: "title", widget: "string" }
      - { label: "URL Slug", name: "slug", widget: "string" }
      - { 
          label: "Product Category", 
          name: "category", 
          widget: "select", 
          options: [
            { label: "Pliers & Wire Cutters", value: "pliers" },
            { label: "Adjustable Wrenches", value: "adjustable-wrenches" },
            { label: "Bespoke Tool Kits", value: "tool-kits" },
            { label: "Other Hand Tools", value: "other-products" }
          ] 
        }
      - { label: "HSN Code", name: "hsnCode", widget: "string", required: false }
      - { label: "Brief Description Summary", name: "description", widget: "text" }
      - { label: "Product Gallery Photos", name: "images", widget: "list", field: { label: "Image File", name: "image", widget: "image" } }
      - { label: "Specification/HTML Details", name: "rawContent", widget: "code", required: false, default_language: "html" }

  - name: "pages"
    label: "Corporate Pages Content"
    delete: false
    create: false
    files:
      - label: "About Us Company Page"
        name: "about"
        file: "src/content/pages/about-us.json"
        extension: "json"
        format: "json"
        fields:
          - { label: "Unique ID", name: "id", widget: "hidden", default: "815" }
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "URL Slug", name: "slug", widget: "hidden", default: "about-us" }
          - { label: "Company Legacy Narrative", name: "description", widget: "markdown" }
          - { label: "Compliance & Plant Certificates Gallery", name: "images", widget: "list", field: { label: "Certificate", name: "image", widget: "image" } }

      - label: "Careers Job Board"
        name: "careers"
        file: "src/content/pages/careers.json"
        extension: "json"
        format: "json"
        fields:
          - { label: "Unique ID", name: "id", widget: "hidden", default: "821" }
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "URL Slug", name: "slug", widget: "hidden", default: "careers" }
          - { label: "Careers Page Heading", name: "description", widget: "text" }

      - label: "Downloads & Media Center"
        name: "downloads"
        file: "src/content/pages/downloads.json"
        extension: "json"
        format: "json"
        fields:
          - { label: "Unique ID", name: "id", widget: "hidden", default: "830" }
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "URL Slug", name: "slug", widget: "hidden", default: "downloads" }
          - { label: "Downloads Center Text", name: "description", widget: "text" }

      - label: "Knowledge Base & FAQs"
        name: "knowledge"
        file: "src/content/pages/knowledge.json"
        extension: "json"
        format: "json"
        fields:
          - { label: "Unique ID", name: "id", widget: "hidden", default: "16" }
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "URL Slug", name: "slug", widget: "hidden", default: "knowledge" }
          - { label: "Leverage Physics Overview", name: "description", widget: "markdown" }
